name: CI

# Add some triggers
on:
  push:
  pull_request:
  workflow_dispatch:
#  schedule:
#    - cron: '42 5 * * *'

jobs:
  test:
    strategy:
      fail-fast: false
      # List some of the tags from https://hub.docker.com/_/postgres
      # You can be very specific or not so specific or just use the latest
      matrix:
        postgres: ['16.13-trixie', '17', 'latest']

    # The `services` will launch a separate docker container using the given image
    # That we take from the matrix
    services:
      postgres:
        image: postgres:${{matrix.postgres}}
        env:
          # We defined some environment variables for the server
          # That are also used in the client software
          POSTGRES_USER: username
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mydb

       # Some magic options needed for the Postgres in the Docker container
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # This is where we define where and how our code runs
    runs-on: ubuntu-latest
    # It is easier if we also use a Docker container
    container: ubuntu:25.10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install curl and ping
        # Install some tools to demonstrate connectivity to the database
        run: |
          apt update
          apt install -y iputils-ping
          apt install -y postgresql-client

      - name: ping postgres
        # The hostname of the postgres server is "postgres"
        run: |
          ping -c 4 postgres

      - name: PostgreSQL CLI psql
        env:
          PGPASSWORD: secret
        run: |
          set -x
          echo "SELECT CURRENT_TIME" | psql -h postgres -U username mydb
          echo "SELECT version()" | psql -h postgres -U username mydb

